<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Service CarHunt</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Service CarHunt" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Source Sans 3', sans-serif; background: #0D1117; color: #E0E0E0; min-height: 100vh; }
    button { cursor: pointer; font-family: 'Source Sans 3', sans-serif; }
    input, select, textarea { font-family: 'Source Sans 3', sans-serif; }

    /* App container - wider on desktop */
    #app { max-width: 720px; margin: 0 auto; padding: 16px 16px 60px; }
    @media (min-width: 768px) {
      #app { padding: 24px 32px 60px; }
    }

    /* Header */
    .header-row { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; padding-bottom: 14px; border-bottom: 1px solid #1E2A3A; }
    .header-left { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; }
    .header-logo { height: 32px; width: auto; object-fit: contain; }
    .header-divider { width: 1px; height: 28px; background: #1E2A3A; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #E94560; letter-spacing: -0.3px; }
    .header-sub { color: #4A5568; font-size: 11px; margin-top: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; display: inline-block; animation: pulse 2s infinite; flex-shrink: 0; }

    /* Nav tabs - responsive grid */
    .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 16px; }
    @media (min-width: 500px) { .nav-tabs { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 700px) { .nav-tabs { grid-template-columns: repeat(4, 1fr); } }
    .nav-tab { padding: 10px 8px; border-radius: 10px; border: 1px solid #1E2A3A; font-size: 12px; font-weight: 600; background: #161B22; color: #4A5568; cursor: pointer; text-align: center; width: 100%; transition: all 0.15s; }
    .nav-tab:hover { border-color: #2A3A4A; color: #718096; }
    .nav-tab.active { background: #E94560; color: white; border-color: #E94560; }
    .nav-vulc { background: linear-gradient(135deg, #7C3AED, #5B21B6) !important; color: white !important; border-color: #7C3AED !important; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(6, 1fr); } }
    .stat-card { background: #161B22; border: 1px solid #1E2A3A; border-radius: 12px; padding: 12px 6px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1; }
    .stat-lbl { font-size: 10px; color: #4A5568; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.2; }

    /* Buttons */
    .btn { padding: 11px 16px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.15s; }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: #E94560; color: white; }
    .btn-secondary { background: #161B22; color: #A0C4FF; border: 1px solid #1E2A3A; }
    .btn-green { background: #0D2818; color: #4CAF50; border: 1px solid #2A5A3A; }
    .btn-orange { background: #1E1400; color: #F39C12; border: 1px solid #3A2800; }
    .btn-purple { background: #1A0D3A; color: #A78BFA; border: 1px solid #3D1F8A; }
    .btn-danger { background: transparent; color: #E94560; border: 1px solid #E94560; font-size: 13px; padding: 8px 12px; min-height: 36px; border-radius: 8px; }
    .btn-full { width: 100%; }
    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-row .btn { flex: 1; }
    .btn-sm { padding: 8px 12px; font-size: 12px; min-height: 36px; }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: #4A5568; margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0D1117; border: 1px solid #1E2A3A; color: #E0E0E0; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #E94560; }
    .form-group select option { background: #161B22; }
    .add-form-box { background: #161B22; border: 1px solid #E94560; border-radius: 16px; padding: 20px; margin-bottom: 16px; }

    /* Car cards */
    .car-card { border-radius: 14px; margin-bottom: 8px; overflow: hidden; border: 1px solid #1E2A3A; background: #161B22; transition: border-color 0.15s; }
    .car-card.sla-yellow { border-color: #F39C12; }
    .car-card.sla-red { border-color: #E94560; }
    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; min-height: 64px; }
    .card-nr { font-family: 'Playfair Display', serif; font-size: 20px; color: #E0E0E0; }
    .card-service { font-size: 13px; color: #A0C4FF; margin-top: 2px; }
    .card-vin { font-size: 11px; color: #4A5568; margin-top: 2px; }
    .card-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 55%; }
    .badge { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .card-arrow { color: #4A5568; font-size: 14px; margin-left: 4px; flex-shrink: 0; }
    .card-body { padding: 0 14px 18px; }
    .divider { height: 1px; background: #1E2A3A; margin-bottom: 14px; }
    .sla-bar { padding: 6px 16px; font-size: 12px; font-weight: 600; text-align: center; }
    .sla-bar.yellow { background: #1E1400; color: #F39C12; }
    .sla-bar.red { background: #1E0A0A; color: #E94560; }

    /* Card tabs */
    .tabs-row { display: flex; gap: 5px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; scrollbar-width: none; }
    .tabs-row::-webkit-scrollbar { display: none; }
    .tab { padding: 9px 13px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; background: #0D1117; color: #4A5568; cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 36px; border: 1px solid #1E2A3A; }
    .tab.active { background: #161B22; color: #A0C4FF; border-color: #2A3A5A; }

    /* Sections */
    .section-box { background: #0D1117; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #1E2A3A; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .field-block { margin-bottom: 16px; }
    .field-label { font-size: 11px; color: #4A5568; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .field-value { font-size: 15px; color: #CBD5E0; line-height: 1.5; }
    .field-edit { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .field-edit input { flex: 1; background: #0D1117; border: 1px solid #1E2A3A; color: #E0E0E0; border-radius: 10px; padding: 10px 12px; font-size: 16px; outline: none; -webkit-appearance: none; }

    /* Piese */
    .piesa-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #1E2A3A; }
    .piesa-row:last-child { border-bottom: none; }
    .inner-form { background: #161B22; border-radius: 10px; padding: 14px; margin-bottom: 12px; border: 1px solid #1E2A3A; }

    /* Tasks */
    .task-row { padding: 12px 0; border-bottom: 1px solid #1E2A3A; }
    .task-row:last-child { border-bottom: none; }
    .task-row.done { opacity: 0.5; }
    .task-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .task-text { font-size: 15px; color: #CBD5E0; line-height: 1.4; flex: 1; }
    .task-text.done-text { text-decoration: line-through; color: #4A5568; }
    .task-meta { font-size: 11px; color: #4A5568; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; }
    .task-assignee { font-size: 12px; font-weight: 600; color: #A0C4FF; }
    .task-form { background: #161B22; border-radius: 10px; padding: 14px; margin-bottom: 12px; border: 1px solid #1E2A3A; }

    /* Remindere */
    .reminder-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #1E2A3A; }
    .reminder-row:last-child { border-bottom: none; }
    .reminder-form { background: #161B22; border-radius: 10px; padding: 14px; margin-bottom: 14px; border: 1px solid #2D6A2D; }
    .date-time-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .date-time-row > div { flex: 1; }
    .date-time-row input { width: 100%; background: #0D1117; border: 1px solid #1E2A3A; color: #E0E0E0; border-radius: 10px; padding: 10px 12px; font-size: 15px; outline: none; -webkit-appearance: none; }

    /* Jurnal */
    .jurnal-row { padding: 12px 0; border-bottom: 1px solid #1E2A3A; }
    .jurnal-row:last-child { border-bottom: none; }
    .jurnal-meta { font-size: 11px; color: #4A5568; margin-bottom: 5px; }
    .jurnal-text { font-size: 14px; color: #CBD5E0; line-height: 1.5; }
    .jurnal-input-box { background: #161B22; border-radius: 10px; padding: 14px; margin-bottom: 14px; border: 1px solid #1E2A3A; }
    .jurnal-input-box textarea { width: 100%; background: #0D1117; border: 1px solid #1E2A3A; color: #E0E0E0; border-radius: 10px; padding: 12px; font-size: 15px; outline: none; resize: vertical; margin-bottom: 10px; }

    /* TODO page */
    .todo-card { background: #161B22; border: 1px solid #1E2A3A; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
    .todo-car-label { font-size: 11px; color: #A0C4FF; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .todo-text { font-size: 15px; color: #E0E0E0; line-height: 1.4; margin-bottom: 8px; }
    .todo-meta { font-size: 12px; color: #4A5568; display: flex; gap: 12px; flex-wrap: wrap; }
    .todo-date { color: #F39C12; font-weight: 600; }
    .todo-nodate { color: #E94560; font-weight: 600; }
    .todo-done { background: #0D1117; border-color: #1E2A3A; opacity: 0.5; }

    /* Archive */
    .archive-card { background: #161B22; border: 1px solid #1E2A3A; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
    .search-box { background: #161B22; border: 1px solid #1E2A3A; border-radius: 10px; padding: 12px 14px; font-size: 16px; color: #E0E0E0; width: 100%; outline: none; margin-bottom: 14px; }

    /* Profile setup */
    .profile-screen { max-width: 400px; margin: 60px auto; padding: 0 20px; text-align: center; }
    .profile-box { background: #161B22; border: 1px solid #E94560; border-radius: 20px; padding: 32px 24px; }

    /* SLA settings */
    .sla-settings { background: #161B22; border: 1px solid #1E2A3A; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .sla-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .sla-row:last-child { margin-bottom: 0; }
    .sla-label { font-size: 14px; flex: 1; color: #CBD5E0; }
    .sla-input { width: 70px; background: #0D1117; border: 1px solid #1E2A3A; color: #E0E0E0; border-radius: 8px; padding: 8px 10px; font-size: 16px; text-align: center; outline: none; -webkit-appearance: none; }

    /* Misc */
    .empty-state { color: #4A5568; font-size: 14px; text-align: center; padding: 32px 0; }
    .loading { text-align: center; padding: 40px 20px; color: #4A5568; font-size: 16px; }
    .delete-row { text-align: center; margin-top: 8px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0D2818; border: 1px solid #4CAF50; color: #A5D6A7; padding: 14px 28px; border-radius: 12px; font-size: 15px; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.5); white-space: nowrap; display: none; }
    .user-chip { display: inline-flex; align-items: center; gap: 5px; background: #0D1117; border: 1px solid #1E2A3A; border-radius: 20px; padding: 4px 10px; font-size: 12px; color: #A0C4FF; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  </style>
</head>
<body>
<div id="app"><div class="loading">⏳ Se conectează...</div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY8U1vkZDrM_4jqHL4cooTogNUCyo01Ds",
  authDomain: "serviceauto-f46c5.firebaseapp.com",
  projectId: "serviceauto-f46c5",
  storageBucket: "serviceauto-f46c5.firebasestorage.app",
  messagingSenderId: "257336890337",
  appId: "1:257336890337:web:f4bc7590334c626f02f8a0"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ===== STATE =====
let cars = [];
let users = [];
let settings = { slaYellow: 15, slaRed: 30 };
let currentUser = JSON.parse(localStorage.getItem("sa_user") || "null");
let page = localStorage.getItem("sa_page") || "masini"; // masini | todo | arhiva
let vulcPage_saved = localStorage.getItem("sa_vulcpage") || "flota";
let expandedCar = null;
let activeTab = {};
let showForm = false;
let showPiesaForm = null;
let showReminderForm = null;
let showTaskForm = null;
let archiveSearch = "";
let searchService = "";
let searchSH = "";
let searchServiceTimer = null;
let searchSHTimer = null;
let expandedUser = null;
let registeredPins = [];
let generalTasks = [];
let inventarPiese = [];
let showGeneralTaskForm = false;
let showInventarForm = false;
let arhivaFilter = "toate";
let newGeneralTask = { text: "", data: "", assignedTo: "" };
let showCommentForm = null;

// CarhuntSH state
let shMasini = [];
let shPerfDoc = [];
let shPage = localStorage.getItem("sa_shpage") || "masini";
let showShForm = false;
let expandedShCar = null;
let shActiveTab = {};
let newShCar = { nr: "", marca: "", model: "", status: "De inspectat", pret: "", dataPostCarHunt: "", dataPostAutovit: "" };
let commentText = "";
let newPiesa = { nume: "", status: "De comandat" };
let newReminder = { text: "", data: "", ora: "09:00" };
let newTask = { text: "", data: "", assignedTo: "" };
let newInventar = { nume: "", masina: "", cod: "", pret: "", status: "În stoc" };

const STATUS_COLORS = {
  "De comandat": { bg: "#2A1A2E", text: "#CC88FF", border: "#6A2A9A" },
  "Comandat":    { bg: "#3A2E00", text: "#FFD166", border: "#7A5E00" },
  "În tranzit":  { bg: "#001A3A", text: "#66B2FF", border: "#0050A0" },
  "Sosit":       { bg: "#003A15", text: "#66CC88", border: "#006628" },
  "Montat":      { bg: "#2A2A2A", text: "#AAAAAA", border: "#444444" },
};
const CAR_STATUS = { "În așteptare": "#F39C12", "În lucru": "#3498DB", "Finalizat": "#27AE60" };
const ROLES = ["Admin", "Operator", "Șofer"];
const today = new Date().toISOString().split("T")[0];

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3500);
}

function fmt(dateStr) {
  if (!dateStr) return "—";
  const [y, m, d] = dateStr.split("-");
  return `${d}.${m}.${y}`;
}

function daysSince(ts) {
  if (!ts) return 0;
  return Math.floor((Date.now() - ts) / (1000 * 60 * 60 * 24));
}

function getSLA(car) {
  const days = daysSince(car.createdAt);
  if (days >= settings.slaRed) return "red";
  if (days >= settings.slaYellow) return "yellow";
  return "ok";
}

function addLog(car, action) {
  const now = new Date();
  const dataOra = now.toLocaleDateString("ro-RO") + " · " + now.toLocaleTimeString("ro-RO", {hour:"2-digit",minute:"2-digit"});
  const entry = { id: Date.now(), text: action, dataOra, user: currentUser?.name || "?" };
  return [...(car.jurnal || []), entry];
}

// ===== RENDER =====
function render() {
  if (!currentUser) { renderProfile(); return; }
  const html = `
    <div class="header-row">
      <div class="header-left">
        <img src="https://www.carhunt.ro/public/uploads/logofull.png" class="header-logo" alt="CarHunt" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <div style="display:none;font-family:'Playfair Display',serif;font-size:20px;color:#E94560;font-weight:700">CarHunt</div>
        <div class="header-divider"></div>
        <div>
          <div class="header-title" style="color:${page==='vulcanizare'?'#A78BFA':'#E94560'}">${page==='vulcanizare'?'Vulcanizare':'Service'}</div>
          <div class="header-sub"><span class="sync-dot"></span> Live · <span class="user-chip">👤 ${currentUser.name} · ${currentUser.role}</span></div>
        </div>
      </div>
      <div class="header-actions">
        ${currentUser.role==='Admin' ? `<button class="btn btn-sm btn-secondary" onclick="${page==='vulcanizare'?'changeVulcPage(\'setari\')':'showSettings()'}" style="${page==='setari'||vulcPage==='setari'?'background:#E94560;color:white;border-color:#E94560':''}">⚙️</button>` : ""}
      </div>
    </div>

    ${page === 'vulcanizare' ? '' : `
    <div class="nav-tabs">
      <button class="nav-tab ${page==='masini'?'active':''}" onclick="changePage('masini')">🚗 Mașini</button>
      <button class="nav-tab ${page==='todo'?'active':''}" onclick="changePage('todo')">📋 TO DO</button>
      <button class="nav-tab ${page==='overview'?'active':''}" onclick="changePage('overview')">📊 Overview</button>
      <button class="nav-tab ${page==='myactivity'?'active':''}" onclick="changePage('myactivity')">📤 Activitate</button>
      <button class="nav-tab ${page==='taskgeneral'?'active':''}" onclick="changePage('taskgeneral')">➕ Task nou</button>
      <button class="nav-tab ${page==='inventar'?'active':''}" onclick="changePage('inventar')">🔩 Inventar</button>
      <button class="nav-tab ${page==='arhiva'?'active':''}" onclick="changePage('arhiva')">📦 Arhivă</button>
      <button class="nav-tab nav-vulc" onclick="changePage('vulcanizare')">🔄 Vulcanizare</button>
      <button class="nav-tab" onclick="changePage('carhuntsh')" style="${page==='carhuntsh'||page==='perfdoc'?'background:#10B981;color:white;border-color:#10B981':'background:#161B22;color:#10B981;border-color:#10B981'}">🏷 CarHuntSH</button>
    </div>`}

    ${page === 'masini' ? renderMasini() : ""}
    ${page === 'todo' ? renderTodo() : ""}
    ${page === 'overview' ? renderOverview() : ""}
    ${page === 'myactivity' ? renderMyActivity() : ""}
    ${page === 'taskgeneral' ? renderTaskGeneral() : ""}
    ${page === 'inventar' ? renderInventar() : ""}
    ${page === 'arhiva' ? renderArhiva() : ""}
    ${page === 'vulcanizare' ? renderVulcanizare() : ""}
    ${page === 'carhuntsh' ? renderCarHuntSH() : ""}
    ${page === 'perfdoc' ? renderPerfDoc() : ""}
    ${page === 'setari' ? renderSetariPage() : ""}
  `;
  document.getElementById("app").innerHTML = html;
}

function renderMasini() {
  const activeCars = cars.filter(c => !c.archived);
  const filtered = activeCars.filter(c => !searchService ||
    c.nrInmatriculare?.toLowerCase().includes(searchService.toLowerCase()) ||
    c.service?.toLowerCase().includes(searchService.toLowerCase()) ||
    c.vin?.toLowerCase().includes(searchService.toLowerCase())
  );
  const sorted = [...filtered].sort((a, b) => {
    const statusOrder = { "În așteptare": 0, "În lucru": 1, "Finalizat": 2 };
    const statusDiff = (statusOrder[a.status] ?? 1) - (statusOrder[b.status] ?? 1);
    if (statusDiff !== 0) return statusDiff;
    const slaOrder = { red: 0, yellow: 1, ok: 2 };
    return (slaOrder[getSLA(a)] || 2) - (slaOrder[getSLA(b)] || 2);
  });
  const total = activeCars.length;
  const inLucru = activeCars.filter(c => c.status === "În lucru").length;
  const finalizate = activeCars.filter(c => c.status === "Finalizat").length;
  const piese = activeCars.reduce((a, c) => a + (c.piese||[]).filter(p => p.status==="Comandat"||p.status==="În tranzit").length, 0);
  const taskuri = activeCars.reduce((a, c) => a + (c.tasks||[]).filter(t => !t.done && t.assignedTo === currentUser?.name).length, 0);
  const rosii = activeCars.filter(c => getSLA(c) === "red").length;

  return `
    <div class="stats-grid">

function renderCarCard(car) {
  const sla = getSLA(car);
  const sc = CAR_STATUS[car.status] || "#718096";
  const pieseActive = (car.piese||[]).filter(p=>p.status!=="Montat").length;
  const remCount = (car.remindere||[]).length;
  const jurnalCount = (car.jurnal||[]).length;
  const taskCount = (car.tasks||[]).filter(t=>!t.done).length;
  const tab = activeTab[car.id] || "reparatii";
  const isExp = expandedCar === car.id;
  const days = daysSince(car.createdAt);

  return `
  <div class="car-card ${sla !== 'ok' ? 'sla-'+sla : ''}">
    ${sla === 'red' ? `<div class="sla-bar red">🚨 ${days} zile în lucru — ÎNTÂRZIAT CRITIC</div>` : ""}
    ${sla === 'yellow' ? `<div class="sla-bar yellow">⚠️ ${days} zile în lucru — Atenție</div>` : ""}
    <div class="card-header" onclick="toggleCar('${car.id}')">
      <div style="flex:1;min-width:0">
        <div class="card-nr">${car.nrInmatriculare}</div>
        ${car.service ? `<div class="card-service">📍 ${car.service}</div>` : ""}
        ${car.vin ? `<div class="card-vin">VIN: ${car.vin}</div>` : ""}
      </div>
      <div class="card-badges">
        ${taskCount>0?`<span class="badge" style="background:#1A2A4A;color:#A0C4FF;border:1px solid #2A4A8A">✅${taskCount}</span>`:""}
        ${pieseActive>0?`<span class="badge" style="background:#3A1B00;color:#FF9944;border:1px solid #7A3A00">📦${pieseActive}</span>`:""}
        <span class="badge" style="background:${sc}22;color:${sc};border:1px solid ${sc}55">${car.status}</span>
        <span class="card-arrow">${isExp?"▲":"▼"}</span>
      </div>
    </div>

    ${isExp ? `
    <div class="card-body">
      <div class="divider"></div>
      <div class="tabs-row">
        <button class="tab ${tab==="reparatii"?"active":""}" onclick="setTab('${car.id}','reparatii')">🔧 Info</button>
        <button class="tab ${tab==="tasks"?"active":""}" onclick="setTab('${car.id}','tasks')">✅ Tasks (${(car.tasks||[]).length})</button>
        <button class="tab ${tab==="piese"?"active":""}" onclick="setTab('${car.id}','piese')">📦 Piese (${(car.piese||[]).length})</button>
        <button class="tab ${tab==="remindere"?"active":""}" onclick="setTab('${car.id}','remindere')">🔔 (${remCount})</button>
        <button class="tab ${tab==="jurnal"?"active":""}" onclick="setTab('${car.id}','jurnal')">📝 Istoric (${jurnalCount})</button>
      </div>

      ${tab==="reparatii" ? renderTabReparatii(car) : ""}
      ${tab==="tasks" ? renderTabTasks(car) : ""}
      ${tab==="piese" ? renderTabPiese(car) : ""}
      ${tab==="remindere" ? renderTabRemindere(car) : ""}
      ${tab==="jurnal" ? renderTabJurnal(car) : ""}


    </div>` : ""}
  </div>`;
}

function renderTodo() {
  const myTasks = [];
  // Car tasks (Service)
  cars.filter(c => !c.archived).forEach(car => {
    (car.tasks||[]).filter(t => !t.done && t.assignedTo === currentUser?.name).forEach(t => {
      myTasks.push({ ...t, carId: car.id, carNr: car.nrInmatriculare, isGeneral: false, isSH: false });
    });
  });
  // General tasks
  generalTasks.filter(t => !t.done && t.assignedTo === currentUser?.name).forEach(t => {
    myTasks.push({ ...t, carNr: null, isGeneral: true, isSH: false });
  });
  // CarhuntSH tasks
  shMasini.filter(m => !m.vanduta && !m.arhivata).forEach(m => {
    (m.tasks||[]).filter(t => !t.done && t.assignedTo === currentUser?.name).forEach(t => {
      myTasks.push({ ...t, carId: m.id, carNr: m.nr, isGeneral: false, isSH: true });
    });
  });

  myTasks.sort((a, b) => {
    if (!a.data && !b.data) return 0;
    if (!a.data) return -1;
    if (!b.data) return 1;
    return a.data.localeCompare(b.data);
  });

  return `
  <div style="margin-bottom:16px">
    <div style="font-family:'Playfair Display',serif;font-size:20px;color:#A0C4FF;margin-bottom:4px">📋 TO DO — ${currentUser?.name}</div>
    <div style="font-size:13px;color:#718096">${myTasks.length} task${myTasks.length!==1?"uri":""} de rezolvat</div>
  </div>
  ${myTasks.length === 0 ? `<div class="empty-state" style="padding:40px 0">🎉<br><br>Nu ai niciun task de rezolvat!</div>` :
    myTasks.map(t => {
      const taskKey = t.isGeneral ? `gen_${t.id}` : t.isSH ? `sh_${t.carId}_${t.id}` : `car_${t.carId}_${t.id}`;
      return `
    <div class="todo-card">
      ${t.isSH ? `<div class="todo-car-label" style="color:#10B981">🏷 SH: ${t.carNr}</div>` : t.carNr ? `<div class="todo-car-label">🚗 ${t.carNr}</div>` : `<div class="todo-car-label" style="color:#F39C12">➕ Task general</div>`}
      <div class="todo-text">${t.text}</div>
      <div class="todo-meta">
        ${t.data ? `<span class="todo-date">📅 ${fmt(t.data)}</span>` : `<span class="todo-nodate">📅 Fără dată</span>`}
        <span>De la: ${t.createdBy}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
        <input type="date" id="todo-data-${taskKey}" value="${t.data||""}" style="flex:1;background:#0D1117;border:1px solid #1E2A3A;color:#E0E0E0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none" />
        <button class="btn btn-secondary btn-sm" onclick="saveTodoDate('${taskKey}','${t.isGeneral?'gen':t.isSH?'sh':'car'}','${t.isGeneral?(t.docId||t.id):t.carId+'_'+t.id}')">📅</button>
        ${t.isSH ? `<button class="btn btn-green btn-sm" onclick="doneShTask('${t.carId}',${t.id})">✓ Done</button>` :
          t.isGeneral ? `<button class="btn btn-green btn-sm" onclick="doneGeneralTask(${t.id})">✓ Done</button>` :
          `<button class="btn btn-green btn-sm" onclick="doneTask('${t.carId}',${t.id})">✓ Done</button>`}
      </div>
      ${renderComments(t.comments||[], taskKey)}
    </div>`;
    }).join("")}
  `;
}

function renderOverview() {
  const activeCars = cars.filter(c => !c.archived);
  const byUser = {};
  // Car tasks (Service)
  activeCars.forEach(car => {
    (car.tasks||[]).filter(t => !t.done).forEach(t => {
      if (!byUser[t.assignedTo]) byUser[t.assignedTo] = [];
      byUser[t.assignedTo].push({ ...t, carNr: car.nrInmatriculare, carId: car.id, isGeneral: false, isSH: false });
    });
  });
  // General tasks
  generalTasks.filter(t => !t.done).forEach(t => {
    if (!byUser[t.assignedTo]) byUser[t.assignedTo] = [];
    byUser[t.assignedTo].push({ ...t, carNr: null, isGeneral: true, isSH: false });
  });
  // CarhuntSH tasks
  shMasini.filter(m => !m.vanduta && !m.arhivata).forEach(m => {
    (m.tasks||[]).filter(t => !t.done).forEach(t => {
      if (!byUser[t.assignedTo]) byUser[t.assignedTo] = [];
      byUser[t.assignedTo].push({ ...t, carNr: m.nr, carId: m.id, isGeneral: false, isSH: true });
    });
  });

  const totalTasks = Object.values(byUser).reduce((a, arr) => a + arr.length, 0);
  const userNames = Object.keys(byUser).sort((a,b) => (byUser[b].length - byUser[a].length));

  return `
  <div style="margin-bottom:16px">
    <div style="font-family:'Playfair Display',serif;font-size:20px;color:#A0C4FF;margin-bottom:4px">📊 Overview echipă</div>
    <div style="font-size:13px;color:#718096">${totalTasks} task${totalTasks!==1?"uri":""} active · ${userNames.length} membri cu taskuri</div>
  </div>
  ${totalTasks === 0 ? `<div class="empty-state" style="padding:40px 0">🎉<br><br>Niciun task activ în echipă!</div>` :
    userNames.map(name => {
      const tasks = byUser[name];
      const isExp = expandedUser === name;
      const sorted = [...tasks.filter(t=>!t.data), ...tasks.filter(t=>t.data).sort((a,b)=>a.data.localeCompare(b.data))];
      const creators = [...new Set(tasks.map(t => t.createdBy))];
      return `
      <div style="background:#161B22;border:1px solid #1E2A3A;border-radius:14px;margin-bottom:10px;overflow:hidden">
        <div style="background:#0D1117;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleUser('${name}')">
          <div>
            <div style="font-size:16px;font-weight:700;color:#E0E0E0">👤 ${name}</div>
            <div style="font-size:12px;color:#718096;margin-top:3px">de la: ${creators.join(", ")}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="background:#E94560;color:white;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700">${tasks.length} task${tasks.length!==1?"uri":""}</span>
            <span style="color:#4A5568;font-size:16px">${isExp?"▲":"▼"}</span>
          </div>
        </div>
        ${isExp ? `
        <div style="padding:10px 16px">
          ${sorted.map(t => {
            const createdDate = t.createdAt ? new Date(t.createdAt).toLocaleDateString("ro-RO") + " · " + new Date(t.createdAt).toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"}) : "—";
            return `
          <div style="padding:12px 0;border-bottom:1px solid #1A2A4A;display:flex;align-items:flex-start;gap:10px">
            <div style="flex:1">
              <div style="font-size:15px;color:#E0E0E0;line-height:1.4;margin-bottom:8px;font-weight:600">${t.text}</div>
              <div style="display:flex;flex-direction:column;gap:4px;font-size:12px">
                <span style="color:#A0C4FF">🚗 ${t.carNr}</span>
                <span style="color:#9B8FC7">👤 Distribuit de <strong>${t.createdBy}</strong></span>
                <span style="color:#4A5568">🕐 Creat la: ${createdDate}</span>

}

function renderMyActivity() {
  const activeCars = cars.filter(c => !c.archived);
  const byRecipient = {};
  // Car tasks
  activeCars.forEach(car => {
    (car.tasks||[]).filter(t => !t.done && t.createdBy === currentUser?.name).forEach(t => {
      if (!byRecipient[t.assignedTo]) byRecipient[t.assignedTo] = [];
      byRecipient[t.assignedTo].push({ ...t, carNr: car.nrInmatriculare, carId: car.id, isGeneral: false });
    });
  });
  // General tasks
  generalTasks.filter(t => !t.done && t.createdBy === currentUser?.name).forEach(t => {
    if (!byRecipient[t.assignedTo]) byRecipient[t.assignedTo] = [];
    byRecipient[t.assignedTo].push({ ...t, carNr: null, isGeneral: true });
  });

  const totalTasks = Object.values(byRecipient).reduce((a, arr) => a + arr.length, 0);
  const recipients = Object.keys(byRecipient).sort((a,b) => byRecipient[b].length - byRecipient[a].length);

  return `
  <div style="margin-bottom:16px">
    <div style="font-family:'Playfair Display',serif;font-size:20px;color:#F39C12;margin-bottom:4px">📤 My Activity — ${currentUser?.name}</div>
    <div style="font-size:13px;color:#718096">${totalTasks} task${totalTasks!==1?"uri":""} distribuite de tine · nerezolvate</div>
  </div>
  ${totalTasks === 0 ? `<div class="empty-state" style="padding:40px 0">🎉<br><br>Nu ai niciun task distribuit nerezolvat!</div>` :
    recipients.map(name => {
      const tasks = byRecipient[name];
      const isExp = expandedUser === ('my_'+name);
      const sorted = [...tasks.filter(t=>!t.data), ...tasks.filter(t=>t.data).sort((a,b)=>a.data.localeCompare(b.data))];
      return `
      <div style="background:#161B22;border:1px solid #3A2A00;border-radius:14px;margin-bottom:10px;overflow:hidden">
        <div style="background:#1E1A0A;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleUser('my_${name}')">
          <div style="font-size:16px;font-weight:700;color:#E0E0E0">👤 ${name}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="background:#F39C12;color:#1A1A00;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700">${tasks.length} task${tasks.length!==1?"uri":""}</span>
            <span style="color:#4A5568;font-size:16px">${isExp?"▲":"▼"}</span>
          </div>
        </div>
        ${isExp ? `
        <div style="padding:10px 16px">
          ${sorted.map(t => {
            const createdDate = t.createdAt ? new Date(t.createdAt).toLocaleDateString("ro-RO") + " · " + new Date(t.createdAt).toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"}) : "—";
            const editKey = t.isGeneral ? `gen_${t.id}` : `car_${t.carId}_${t.id}`;
            return `
          <div style="padding:12px 0;border-bottom:1px solid #1A2A4A">
            <div style="font-size:15px;color:#E0E0E0;line-height:1.4;margin-bottom:8px;font-weight:600">${t.text}</div>
            <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;margin-bottom:10px">
              ${t.carNr ? `<span style="color:#A0C4FF">🚗 ${t.carNr}</span>` : `<span style="color:#F39C12">➕ Task general</span>`}
              <span style="color:#4A5568">🕐 Creat la: ${createdDate}</span>
              ${t.data ? `<span style="color:#F39C12;font-weight:600">📅 Scadent: ${fmt(t.data)}</span>` : `<span style="color:#E94560">📅 Fără dată scadentă</span>`}
            </div>
            <div style="background:#0D1117;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px">
              <div style="font-size:11px;color:#718096;text-transform:uppercase;letter-spacing:0.05em">✏️ Editează task</div>
              <textarea id="edit-text-${editKey}" rows="2" style="width:100%;background:#1E2A3A;border:1px solid #2A4A6A;color:#E0E0E0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none;resize:none">${t.text}</textarea>
              <div style="display:flex;gap:8px;align-items:center">
                <input type="date" id="edit-data-${editKey}" value="${t.data||""}" style="flex:1;background:#1E2A3A;border:1px solid #2A4A6A;color:#E0E0E0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none" />
                <button class="btn btn-primary btn-sm" onclick="saveTaskEdit('${editKey}','${t.isGeneral?'gen':'car'}','${t.isGeneral?t.docId||t.id:(t.carId+'_'+t.id)}')">💾 Salvează</button>
              </div>
            </div>
          </div>`;
          }).join("")}
        </div>` : ""}
      </div>`;
    }).join("")}

function renderTaskGeneral() {
  const userOptions = users.map(u => `<option value="${u.name}" ${newGeneralTask.assignedTo===u.name?"selected":""}>${u.name} (${u.role})</option>`).join("");

window.importFlota = async () => {
  const numere = NUMERE_IMPORT.filter(n => n && n !== 'NAN' && n !== 'nan');
  if (!confirm(`Importezi ${numere.length} mașini în flotă? Mașinile existente nu vor fi duplicate.`)) return;
  
  let added = 0;
  let skipped = 0;
  const existing = new Set(flota.map(m => m.nr));
  const toAdd = numere.filter(nr => !existing.has(nr));
  
  showToast(`⏳ Se importă ${toAdd.length} mașini...`);
  
  // Import in batches of 10 with delay
  const BATCH = 10;
  for (let i = 0; i < toAdd.length; i += BATCH) {
    const batch = toAdd.slice(i, i + BATCH);
    await Promise.all(batch.map(nr => 
      addDoc(collection(db, "vulc_flota"), {
        nr, marca: "", model: "", tipFata: "", dimFata: "",
        diferitSpateFata: false, tipSpate: "", dimSpate: "",
        incomplete: true, createdAt: Date.now(), createdBy: "Import"
      })
    ));
    added += batch.length;
    // Small delay between batches
    await new Promise(r => setTimeout(r, 200));
    if (i % 50 === 0 && i > 0) showToast(`⏳ Importat ${added}/${toAdd.length}...`);
  }
  skipped = numere.length - added;
  showToast(`✅ Import finalizat: ${added} adăugate, ${skipped} existente!`);
};

window.checkPin = async () => {
  const pin = document.getElementById("p-pin")?.value?.trim();
  if (!pin || pin.length !== 6) { renderProfile("PIN-ul trebuie să aibă exact 6 cifre"); return; }
  const role = getRoleFromPin(pin);
  if (!role) { renderProfile("PIN invalid. Contactează administratorul."); return; }

  // Check if PIN already has a user in Firebase
  try {
    const pinDoc = await getDoc(doc(db, "pins", pin));
    if (pinDoc.exists()) {
      const data = pinDoc.data();
      // Check if disabled
      if (data.disabled) { renderProfile("Accesul tău a fost dezactivat. Contactează administratorul."); return; }
      // PIN already registered — log in directly
      currentUser = { name: data.name, role: data.role, pin };
      localStorage.setItem("sa_user", JSON.stringify(currentUser));
      await setDoc(doc(db, "users", data.name), { name: data.name, role: data.role, pin, lastSeen: Date.now() });
      await setDoc(doc(db, "pins", pin), { lastSeen: Date.now() }, { merge: true });
      render();
      return;
    }
  } catch(e) {}

  // PIN not registered yet — ask for name
  const nameSection = document.getElementById("name-section");
  if (nameSection) {
    nameSection.style.display = "block";
    document.querySelector("#name-section label").textContent = `Bun venit! Cum te cheamă? (Rol: ${role})`;
  }
  const btn = document.querySelector(".profile-box .btn-primary");
  if (btn) { btn.textContent = "Intră în aplicație →"; btn.onclick = () => finalizeProfile(pin, role); }
};

window.finalizeProfile = async (pin, role) => {
  const name = document.getElementById("p-name")?.value?.trim();
  if (!name) { renderProfile("Introdu numele tău"); return; }
  // Save PIN → name association in Firebase
  await setDoc(doc(db, "pins", pin), { name, role, createdAt: Date.now() });
  await setDoc(doc(db, "users", name), { name, role, pin, lastSeen: Date.now() });
  currentUser = { name, role, pin };
  localStorage.setItem("sa_user", JSON.stringify(currentUser));
  render();
};

window.updatePiesa = async (carId, piesaId, status) => {
  const car = cars.find(c => c.id === carId);
  const piesa = (car.piese||[]).find(p => p.id == piesaId);
  const piese = (car.piese || []).map(p => p.id == piesaId ? { ...p, status } : p);
  const jurnal = addLog(car, `Piesă "${piesa?.nume}" → ${status}`);
  await updateDoc(doc(db, "masini", carId), { piese, jurnal });
};

};

    const comments = [...(task.comments||[]), comment];

  } else {
    // car_carId_taskId

    const taskId = parseInt(parts[1]);
    const car = cars.find(c => c.id === carId);
    if (!car) return;
    const tasks = (car.tasks||[]).map(t => t.id == taskId ? { ...t, comments: [...(t.comments||[]), comment] } : t);

function fmtDim(d) {
  if (!d) return "—";
  if (typeof d === "string") return d;
  return `${d.lat}/${d.profil} R${d.diam}${d.c?"C":""}`;
}

function tipClass(tip) {
  if (!tip) return "";
  if (tip === "Iarna") return "tip-iarna";
  if (tip === "Vara") return "tip-vara";
  return "tip-allseason";
}

function tipEmoji(tip) {
  if (tip === "Iarna") return "❄️";
  if (tip === "Vara") return "☀️";
  return "🌿";
}

function nowStr() {
  const now = new Date();
  return now.toLocaleDateString("ro-RO") + " · " + now.toLocaleTimeString("ro-RO", {hour:"2-digit",minute:"2-digit"});
}

async function addIstoric(actiune, masina) {

function renderFlota() {
  const isAdmin = currentUser.role === "Admin";
  let filtered = flota.filter(m => {
    const tipMatch = filterTip === "toate" || m.tipFata === filterTip || m.tipSpate === filterTip;
    const dimMatch = !filterDim || fmtDim(m.dimFata) === filterDim || fmtDim(m.dimSpate) === filterDim;
    const searchMatch = !searchFlota || m.nr?.toLowerCase().includes(searchFlota.toLowerCase()) || m.marca?.toLowerCase().includes(searchFlota.toLowerCase()) || m.model?.toLowerCase().includes(searchFlota.toLowerCase());
    const isIncomplete = !m.marca || !m.model || !m.dimFata || !m.tipFata;
    const incompleteMatch = !filterIncomplete || isIncomplete;
    return tipMatch && dimMatch && searchMatch && incompleteMatch;
  });

  const dimOptions = [`<option value="">Toate dimensiunile</option>`, ...dimensiuni.map(d => `<option value="${fmtDim(d)}" ${filterDim===fmtDim(d)?"selected":""}>${fmtDim(d)}</option>`)].join("");

  return `

    <div style="font-family:'Playfair Display',serif;font-size:18px;color:#F39C12">🚗 Flotă — ${filtered.length} mașini</div>
    ${isAdmin ? `<button class="btn btn-primary btn-sm" onclick="toggleAddMasina()">${showAddMasina?"✕":"+ Mașină"}</button>` : ""}
  </div>

  ${showAddMasina && isAdmin ? renderAddMasinaForm() : ""}

  <input class="search-box" id="search-flota-input" placeholder="🔍 Caută după nr., marcă, model..." oninput="setSearchFlota(this.value)" />

  <div class="filter-row">
    ${["toate","Vara","Iarna","All Season"].map(t => `
    <button class="filter-btn ${filterTip===t?'active-'+(t==='toate'?'toate':t==='Vara'?'vara':t==='Iarna'?'iarna':'allseason'):''}" onclick="setFilterTip('${t}')">
      ${t==='toate'?'🗂 Toate':tipEmoji(t)+' '+t}
    </button>`).join("")}
    <button class="filter-btn" onclick="toggleIncompleteFilter()" style="${filterIncomplete?'background:#3A0A0A;color:#E94560;border-color:#E94560':''}">

      ${dimOptions}

    filtered.map(m => renderMasinaCard(m)).join("")}

  `;

// ===== PREGĂTIRE SEZON =====
function renderSezon() {
  const dimOpts = dimensiuni.map(d => `<option value="${fmtDim(d)}" ${filterDim===fmtDim(d)?"selected":""}>${fmtDim(d)}</option>`).join("");

  // Build sezon analysis
  const analysis = {};
  dimensiuni.forEach(d => {
    const dim = fmtDim(d);
    TIPURI.forEach(tip => {
      const key = `${dim}__${tip}`;
      const peMasini = flota.filter(m => (m.dimFata === dim && m.tipFata === tip) || (m.diferitSpateFata && m.dimSpate === dim && m.tipSpate === tip));
      const nrAnv = peMasini.reduce((a, m) => {
        let count = 0;
        if (m.dimFata === dim && m.tipFata === tip) count += (m.diferitSpateFata ? 2 : 4);
        if (m.diferitSpateFata && m.dimSpate === dim && m.tipSpate === tip) count += 2;
        return a + count;
      }, 0);
      const stocItem = stocAnvelope.find(s => fmtDim(s) === dim && s.tip === tip);
      const inStoc = parseInt(stocItem?.cantitate || 0);
      if (nrAnv > 0 || inStoc > 0) {
        analysis[key] = { dim, tip, peMasini: nrAnv, inStoc, diferenta: inStoc - nrAnv };
      }
    });
  });

  const filteredAnalysis = Object.values(analysis).filter(a => {
    const tipMatch = filterTip === "toate" || a.tip === filterTip;
    const dimMatch = !filterDim || a.dim === filterDim;
    return tipMatch && dimMatch;
  });

  return `
  <div style="margin-bottom:12px">
    <div style="font-family:'Playfair Display',serif;font-size:18px;color:#F39C12;margin-bottom:4px">📊 Pregătire Sezon</div>
    <div style="font-size:13px;color:#718096">Compară stocul cu necesarul flotei</div>
  </div>

  <div class="filter-row">
    ${["toate","Vara","Iarna","All Season"].map(t => `
    <button class="filter-btn ${filterTip===t?'active-'+(t==='toate'?'toate':t==='Vara'?'vara':t==='Iarna'?'iarna':'allseason'):''}" onclick="setFilterTip('${t}')">
      ${t==='toate'?'🗂 Toate':tipEmoji(t)+' '+t}
    </button>`).join("")}
  </div>

  <div class="form-group" style="margin-bottom:14px">
    <select onchange="setFilterDim(this.value)" style="width:100%;background:#1E2A3A;border:1px solid #2A4A6A;color:#E0E0E0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;-webkit-appearance:none">
      <option value="">Toate dimensiunile</option>${dimOpts}
    </select>
  </div>

  ${filteredAnalysis.length === 0 ? `<div class="empty-state">Nicio dată pentru filtrele selectate</div>` :
    filteredAnalysis.sort((a,b) => a.diferenta - b.diferenta).map(a => `
    <div class="card" style="border-color:${a.diferenta < 0 ? '#E94560' : a.diferenta === 0 ? '#F39C12' : '#4CAF50'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
            <span class="tip-badge ${tipClass(a.tip)}">${tipEmoji(a.tip)} ${a.tip}</span>
            <span class="dim-badge">${a.dim}</span>
          </div>
          <div style="font-size:13px;color:#CBD5E0">🚗 Pe mașini: <strong>${a.peMasini} buc</strong></div>
          <div style="font-size:13px;color:#CBD5E0">📦 În stoc: <strong>${a.inStoc} buc</strong></div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:${a.diferenta < 0 ? '#E94560' : '#4CAF50'}">
            ${a.diferenta >= 0 ? '+' : ''}${a.diferenta}
          </div>
          <div style="font-size:11px;color:#718096">${a.diferenta < 0 ? '⚠️ De comandat' : '✅ Suficient'}</div>
        </div>
      </div>
    </div>`).join("")}
  `;
}

window.efectueazaSchimb = async (masinaId) => {
  const m = flota.find(x => x.id === masinaId);
  if (!m) return;

  const tipMontat = document.getElementById("s-tip")?.value || window.schimbData.tipMontat;
  const dimMontat = window.schimbData.altaDimensiune ? (document.getElementById("s-dim")?.value || window.schimbData.dimMontat) : m.dimFata;
  const cantMontat = parseInt(document.getElementById("s-montat")?.value) || window.schimbData.cantMontat;
  const cantDepozitat = parseInt(document.getElementById("s-depozitat")?.value) || window.schimbData.cantDepozitat;
  const casareDiff = Math.max(0, cantMontat - cantDepozitat);
  const motivCasare = document.getElementById("s-casare")?.value?.trim() || window.schimbData.motivCasare;

  if (casareDiff > 0 && !motivCasare) { showToast("⚠️ Completează motivul casării!"); return; }
  if (!dimMontat) { showToast("⚠️ Selectează dimensiunea de montat!"); return; }

  // 1. Scade din stoc (anvelopele montate)
  const stocItem = stocAnvelope.find(s => fmtDim(s) === dimMontat && s.tip === tipMontat);
  if (stocItem) {
    const nouaCant = Math.max(0, (parseInt(stocItem.cantitate)||0) - cantMontat);
    await updateDoc(doc(db, "vulc_stoc", stocItem.id), { cantitate: nouaCant });
  }

  // 2. Adaugă în stoc (anvelopele depozitate)
  if (cantDepozitat > 0) {
    const stocExist = stocAnvelope.find(s => fmtDim(s) === m.dimFata && s.tip === m.tipFata);
    if (stocExist) {
      await updateDoc(doc(db, "vulc_stoc", stocExist.id), { cantitate: (parseInt(stocExist.cantitate)||0) + cantDepozitat });
    } else {
      const dimParts = dimensiuni.find(d => fmtDim(d) === m.dimFata) || { lat: "", profil: "", diam: "", c: false };
      await addDoc(collection(db, "vulc_stoc"), { ...dimParts, tip: m.tipFata, cantitate: cantDepozitat });
    }
  }

  // 3. Casare
  if (casareDiff > 0) {
    await addDoc(collection(db, "vulc_casate"), {
      ...( dimensiuni.find(d => fmtDim(d) === m.dimFata) || { lat: "", profil: "", diam: "", c: false }),
      tip: m.tipFata, cantitate: casareDiff, motiv: motivCasare,
      masina: m.nr, operator: currentUser.name, data: nowStr(), createdAt: Date.now()
    });
  }

  // 4. Actualizează mașina
  const updates = { tipFata: tipMontat };
  if (window.schimbData.altaDimensiune && dimMontat) updates.dimFata = dimMontat;
  await updateDoc(doc(db, "vulc_flota", masinaId), updates);

  // 5. Istoric
  await addIstoric(`Schimb anvelope: montat ${cantMontat}×${tipMontat} ${dimMontat}, depozitat ${cantDepozitat}×${m.tipFata} ${m.dimFata}${casareDiff>0?`, casat ${casareDiff} (${motivCasare})`:""}`, m.nr);

  showSchimbModal = null;
  showToast("✅ Schimb efectuat cu succes!");
};

window.addStoc = async () => {
  const tip = document.getElementById("as-tip")?.value;
  const dimStr = document.getElementById("as-dim")?.value;
  const cant = parseInt(document.getElementById("as-cant")?.value) || 0;
  if (!dimStr || cant <= 0) { showToast("⚠️ Completează dimensiunea și cantitatea!"); return; }
  const dimObj = dimensiuni.find(d => fmtDim(d) === dimStr) || { lat: "", profil: "", diam: "", c: false };
  const exist = stocAnvelope.find(s => fmtDim(s) === dimStr && s.tip === tip);
  if (exist) {
    await updateDoc(doc(db, "vulc_stoc", exist.id), { cantitate: (parseInt(exist.cantitate)||0) + cant });
  } else {
    await addDoc(collection(db, "vulc_stoc"), { ...dimObj, tip, cantitate: cant });
  }
  await addIstoric(`Adăugat stoc: ${cant}×${tip} ${dimStr} (Cumpărare)`);
  showAddStoc = false;
  showToast("✅ Stoc adăugat!");
};

window.deleteStoc = async (id, dim, tip, cantCurenta) => {
  const cantStr = prompt(`Câte anvelope vrei să ștergi din stocul de ${tip} ${dim}?\n(Stoc curent: ${cantCurenta} buc)`);
  if (!cantStr) return;
  const cant = parseInt(cantStr);
  if (isNaN(cant) || cant <= 0) { showToast("⚠️ Cantitate invalidă!"); return; }
  if (cant > cantCurenta) { showToast(`⚠️ Nu poți șterge mai mult decât stocul curent (${cantCurenta})!`); return; }
  const motiv = prompt(`Motiv ștergere ${cant} buc ${tip} ${dim}:\n(ex: Vândute, Casate, Pierdute)`);
  if (!motiv) return;

  const nouaCant = cantCurenta - cant;
  if (nouaCant === 0) {
    await deleteDoc(doc(db, "vulc_stoc", id));
  } else {
    await updateDoc(doc(db, "vulc_stoc", id), { cantitate: nouaCant });
  }
  // Add to casate
  await addDoc(collection(db, "vulc_casate"), {
    lat: "", profil: "", diam: "", c: false, tip, cantitate: cant,
    motiv, operator: currentUser.name, data: nowStr(), createdAt: Date.now(),
    dim
  });
  await addIstoric(`Stoc șters: ${cant}×${tip} ${dim} — Motiv: ${motiv}`);
  showToast("🗑 Stoc actualizat!");
};

function sortDim(a, b) {
  const da = parseInt(a.diam) || 0;
  const db2 = parseInt(b.diam) || 0;
  if (da !== db2) return da - db2;
  const pa = parseInt(a.profil) || 0;
  const pb = parseInt(b.profil) || 0;
  if (pa !== pb) return pa - pb;
  const la = parseInt(a.lat) || 0;
  const lb = parseInt(b.lat) || 0;
  return la - lb;
}

function getDaysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function renderCarHuntSH() {
  const isAdmin = currentUser?.role === 'Admin';
  const active = [...shMasini].filter(m => !m.vanduta && !m.arhivata).filter(m =>
    !searchSH ||
    m.nr?.toLowerCase().includes(searchSH.toLowerCase()) ||
    m.marca?.toLowerCase().includes(searchSH.toLowerCase()) ||
    m.model?.toLowerCase().includes(searchSH.toLowerCase())
  );
  const perfDocCount = shPerfDoc.filter(m => !m.arhivata).length;

  // Sort: alerts first, then by date
  active.sort((a, b) => {
    const aAlert = (getDaysSince(a.dataPostCarHunt) >= 30) || (getDaysSince(a.dataPostAutovit) >= 30);
    const bAlert = (getDaysSince(b.dataPostCarHunt) >= 30) || (getDaysSince(b.dataPostAutovit) >= 30);
    if (aAlert && !bAlert) return -1;
    if (!aAlert && bAlert) return 1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });

  return `
  <div style="display:flex;gap:6px;margin-bottom:14px">
    <button onclick="changePage('carhuntsh')" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid ${page==='carhuntsh'?'#10B981':'#1E2A3A'};background:${page==='carhuntsh'?'#10B981':'#161B22'};color:${page==='carhuntsh'?'white':'#4A5568'};cursor:pointer">🏷 Mașini (${active.length})</button>
    <button onclick="changePage('perfdoc')" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid ${page==='perfdoc'?'#A78BFA':'#1E2A3A'};background:${page==='perfdoc'?'#A78BFA':'#161B22'};color:${page==='perfdoc'?'white':'#4A5568'};cursor:pointer">📋 Perf. Doc ${perfDocCount>0?`(${perfDocCount})`:''}</button>
  </div>

  <div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-family:'Playfair Display',serif;font-size:20px;color:#10B981">🏷 CarHuntSH</div>
      <div style="font-size:13px;color:#4A5568;margin-top:2px">${active.length} mașini active</div>
    </div>

}

function renderShForm() {

    <div class="form-group"><label>Status</label>

function renderShCard(m) {
  const isExp = expandedShCar === m.id;
  const tab = shActiveTab[m.id] || "info";
  const daysCarHunt = getDaysSince(m.dataPostCarHunt);
  const daysAutovit = getDaysSince(m.dataPostAutovit);
  const alertCH = daysCarHunt !== null && daysCarHunt >= 30;
  const alertAV = daysAutovit !== null && daysAutovit >= 30;
  const hasAlert = alertCH || alertAV;

  const statusColors = {
    "De inspectat": { bg: "#1E1A0A", color: "#F59E0B", border: "#92400E" },
    "În pregătire": { bg: "#0A1628", color: "#60A5FA", border: "#1E3A5F" },
    "Gata de vânzare": { bg: "#0A2818", color: "#10B981", border: "#065F46" },
  };
  const sc = statusColors[m.status] || statusColors["De inspectat"];

  return `
  <div style="background:#161B22;border:1px solid ${hasAlert?'#E94560':'#1E2A3A'};border-radius:14px;margin-bottom:8px;overflow:hidden">
    ${hasAlert ? `<div style="background:#1E0A0A;padding:6px 16px;font-size:12px;font-weight:700;color:#E94560;text-align:center">
      🚨 ${alertCH?`STOC ${daysCarHunt} ZILE pe CarHuntSH — MODIFICĂ PREȚUL!`:''} ${alertCH&&alertAV?' | ':''}${alertAV?`STOC ${daysAutovit} ZILE pe Autovit — MODIFICĂ PREȚUL!`:''}
    </div>` : ""}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer" onclick="toggleShCar('${m.id}')">
      <div style="flex:1">
        <div style="font-family:'Playfair Display',serif;font-size:18px;color:#E0E0E0">${m.nr}</div>
        <div style="font-size:13px;color:#A0C4FF;margin-top:2px">${m.marca||""} ${m.model||""}</div>
        <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
          <span style="background:${sc.bg};color:${sc.color};border:1px solid ${sc.border};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600">${m.status}</span>
          ${m.pret?`<span style="background:#0A2818;color:#10B981;border:1px solid #065F46;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600">💶 ${m.pret} EUR</span>`:""}
        </div>
      </div>
      <span style="color:#4A5568;font-size:14px">${isExp?"▲":"▼"}</span>
    </div>

    ${isExp ? `
    <div style="border-top:1px solid #1E2A3A">
      <div style="display:flex;gap:4px;padding:10px 14px;overflow-x:auto">
        ${["info","postare","pret","tasks","istoric"].map(t => `
        <button onclick="setShTab('${m.id}','${t}')" style="padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid #1E2A3A;cursor:pointer;white-space:nowrap;background:${tab===t?'#10B981':'#161B22'};color:${tab===t?'white':'#4A5568'}">
          ${t==='info'?'ℹ️ Info':t==='postare'?'📢 Postare':t==='pret'?'💶 Preț':t==='tasks'?'✅ Tasks':'📋 Istoric'}
        </button>`).join("")}
      </div>
      <div style="padding:0 14px 16px">
        ${tab==='info' ? renderShInfo(m) : ""}
        ${tab==='postare' ? renderShPostare(m) : ""}
        ${tab==='pret' ? renderShPret(m) : ""}
        ${tab==='tasks' ? renderShTasks(m) : ""}
        ${tab==='istoric' ? renderShIstoric(m) : ""}
      </div>
    </div>` : ""}
  </div>`;
}

function renderShInfo(m) {
  const statusOpts = ["De inspectat", "În pregătire", "Gata de vânzare"].map(s =>
    `<option value="${s}" ${m.status===s?"selected":""}>${s}</option>`).join("");
  return `

}

function renderShTasks(m) {
  const tasks = m.tasks || [];
  const active = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  const userOptions = users.map(u => `<option value="${u.name}">${u.name}</option>`).join("");
  const showForm = shActiveTab[m.id + '_taskform'];
  return `
  <div style="margin-top:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

      <button class="btn btn-sm btn-secondary" onclick="toggleShTaskForm('${m.id}')">+ Task nou</button>
    </div>
    ${showForm ? `
    <div style="background:#0D1117;border:1px solid #1E2A3A;border-radius:10px;padding:12px;margin-bottom:12px">
      <textarea id="sh-task-text-${m.id}" rows="2" placeholder="Descriere task..." style="width:100%;background:#161B22;border:1px solid #1E2A3A;color:#E0E0E0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none;resize:none;margin-bottom:8px"></textarea>

        <input type="date" id="sh-task-data-${m.id}" style="flex:1;background:#161B22;border:1px solid #1E2A3A;color:#E0E0E0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none" />
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-secondary btn-sm" onclick="toggleShTaskForm('${m.id}')">Anulează</button>
        <button class="btn btn-sm" style="background:#10B981;color:white;flex:1" onclick="addShTask('${m.id}')">Adaugă task</button>
      </div>
    </div>` : ""}
    ${active.map(t => `
    <div style="padding:10px 0;border-bottom:1px solid #1E2A3A">
      <div style="font-size:14px;color:#E0E0E0;margin-bottom:4px">${t.text}</div>
      <div style="font-size:12px;color:#4A5568">👤 ${t.assignedTo} · de la ${t.createdBy} ${t.data?'· 📅 '+fmt(t.data):''}</div>

    ${done.map(t=>`<div style="padding:8px 0;border-bottom:1px solid #1E2A3A;opacity:0.5;font-size:13px;text-decoration:line-through;color:#4A5568">${t.text}</div>`).join("")}`:''}
  </div>`;
}

function renderShIstoric(m) {

  const showForm = shActiveTab[m.id + '_jurnalform'];
  return `
  <div style="margin-top:10px">

      <button class="btn btn-sm" style="background:#10B981;color:white;width:100%" onclick="addShJurnal('${m.id}')">Adaugă notă</button>

function renderPerfDoc() {
  const masini = shPerfDoc.filter(m => !m.arhivata);

  return `
  <div style="display:flex;gap:6px;margin-bottom:14px">
    <button onclick="changePage('carhuntsh')" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #1E2A3A;background:#161B22;color:#4A5568;cursor:pointer">🏷 Mașini (${shCount})</button>
    <button onclick="changePage('perfdoc')" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #A78BFA;background:#A78BFA;color:white;cursor:pointer">📋 Perf. Doc (${masini.length})</button>
  </div>
  <div style="margin-bottom:14px">
    <div style="font-family:'Playfair Display',serif;font-size:20px;color:#A78BFA">📋 Perfecționare Documente</div>
    <div style="font-size:13px;color:#4A5568;margin-top:2px">${masini.length} mașini în procesare</div>

    masini.map(m => renderPerfDocCard(m)).join("")}`;

function renderPerfDocCard(m) {
  const isExp = expandedShCar === ('pd_'+m.id);
  const campuri = [
    { key: 'leasing', label: '🔒 Închidere leasing' },
    { key: 'garantie', label: '🛡 Card garanție' },
    { key: 'fiscal', label: '🏛 Scos fiscal primărie' },
    { key: 'rca', label: '🚗 Refund RCA' },
    { key: 'comision', label: '💰 Comision plătit' },
  ];
  const allDone = campuri.every(c => m[c.key+'_bifa'] && m[c.key+'_text']);
  const doneCnt = campuri.filter(c => m[c.key+'_bifa'] && m[c.key+'_text']).length;
  return `
  <div style="background:#161B22;border:1px solid ${allDone?'#10B981':'#1E2A3A'};border-radius:14px;margin-bottom:8px;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer" onclick="toggleShCar('pd_${m.id}')">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;color:#E0E0E0">${m.nr}</div>
        <div style="font-size:13px;color:#A0C4FF">${m.marca||""} ${m.model||""}</div>
        <div style="margin-top:6px;display:flex;gap:4px;align-items:center">
          ${campuri.map(c => `<span style="width:12px;height:12px;border-radius:50%;background:${m[c.key+'_bifa']?'#10B981':'#1E2A3A'};display:inline-block;border:1px solid ${m[c.key+'_bifa']?'#10B981':'#4A5568'}"></span>`).join('')}
          <span style="font-size:12px;color:#4A5568;margin-left:4px">${doneCnt}/5</span>
        </div>
      </div>
      <span style="color:#4A5568;font-size:14px">${isExp?"▲":"▼"}</span>
    </div>
    ${isExp ? `
    <div style="border-top:1px solid #1E2A3A;padding:14px 16px">
      ${campuri.map(c => {
        const hasText = !!(m[c.key+'_text']?.trim());
        const isBifat = !!m[c.key+'_bifa'];
        return `
        <div style="padding:12px 0;border-bottom:1px solid #1E2A3A">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <button onclick="togglePerfBifa('${m.id}','${c.key}',${!isBifat})"
              style="width:28px;height:28px;border-radius:50%;border:2px solid ${isBifat?'#10B981':hasText?'#10B981':'#E94560'};background:${isBifat?'#10B981':'transparent'};color:${isBifat?'white':'transparent'};font-size:14px;cursor:${hasText?'pointer':'not-allowed'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${isBifat?'✓':''}
            </button>
            <span style="font-size:14px;font-weight:600;color:${isBifat?'#10B981':'#E0E0E0'}">${c.label}</span>
          </div>
          <textarea id="perf-${m.id}-${c.key}" rows="2" placeholder="Completează detalii..." oninput="savePerfTextLive('${m.id}','${c.key}',this.value)" style="width:100%;background:#0D1117;border:1px solid ${isBifat?'#10B981':hasText?'#2A5A2A':'#1E2A3A'};color:#E0E0E0;border-radius:8px;padding:10px;font-size:14px;outline:none;resize:none">${m[c.key+'_text']||''}</textarea>
          ${!hasText && !isBifat ? `<div style="font-size:11px;color:#E94560;margin-top:3px">⚠️ Completează pentru a putea bifa</div>` : ''}
        </div>`;
      }).join('')}
      <div style="margin-top:16px">
        <button onclick="${allDone?`arhiveazaShMasina('${m.id}')`:'void(0)'}"
          style="width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:${allDone?'pointer':'not-allowed'};background:${allDone?'#10B981':'#1E2A3A'};color:${allDone?'white':'#4A5568'}">
          ${allDone ? '✅ Arhivează mașina' : `🔒 Completează toți pașii (${doneCnt}/5)`}
        </button>
      </div>
    </div>` : ""}
  </div>`;
}

// CarhuntSH Actions
window.toggleShForm = () => { showShForm = !showShForm; newShCar = { nr: "", marca: "", model: "", status: "De inspectat", pret: "", dataPostCarHunt: "", dataPostAutovit: "" }; render(); };
window.toggleShCar = (id) => { expandedShCar = expandedShCar === id ? null : id; render(); };
window.setShTab = (id, tab) => { shActiveTab[id] = tab; render(); };
window.toggleShTaskForm = (id) => { shActiveTab[id+'_taskform'] = !shActiveTab[id+'_taskform']; render(); };
window.toggleShJurnalForm = (id) => { shActiveTab[id+'_jurnalform'] = !shActiveTab[id+'_jurnalform']; render(); };
window.changeShPage = (p) => { shPage = p; localStorage.setItem("sa_shpage", p); render(); };

window.addShMasina = async () => {
  const nr = document.getElementById("sh-nr")?.value?.trim().toUpperCase();
  const marca = document.getElementById("sh-marca")?.value?.trim();
  const model = document.getElementById("sh-model")?.value?.trim();
  const status = document.getElementById("sh-status")?.value || "De inspectat";
  const pret = document.getElementById("sh-pret")?.value || "";
  if (!nr || !marca || !model) { showToast("⚠️ Completează nr., marca și modelul!"); return; }
  if (shMasini.find(m => m.nr === nr && !m.vanduta && !m.arhivata)) { showToast("❌ Mașina există deja în CarHuntSH!"); return; }
  const now = new Date();
  const dataOra = now.toLocaleDateString("ro-RO") + " · " + now.toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"});
  await addDoc(collection(db, "sh_masini"), {
    nr, marca, model, status, pret,
    istoricPret: pret ? [{ pret, data: dataOra, user: currentUser?.name }] : [],
    tasks: [], jurnal: [], dataPostCarHunt: "", dataPostAutovit: "",
    createdAt: Date.now(), createdBy: currentUser?.name, vanduta: false, arhivata: false
  });
  showShForm = false;
  showToast("✅ Mașină adăugată în CarHuntSH!");
};

window.updateShField = async (id, field, value) => {
  await updateDoc(doc(db, "sh_masini", id), { [field]: value });
  showToast("✅ Actualizat!");
};

window.updateShPostare = async (id, platform) => {
  const fieldId = platform === 'carHunt' ? `ch-data-${id}` : `av-data-${id}`;
  const field = platform === 'carHunt' ? 'dataPostCarHunt' : 'dataPostAutovit';
  const val = document.getElementById(fieldId)?.value;
  if (!val) return;
  await updateDoc(doc(db, "sh_masini", id), { [field]: val });
  showToast("✅ Dată postare salvată!");
};

window.updateShPret = async (id) => {
  const pretNou = document.getElementById(`sh-pret-new-${id}`)?.value?.trim();
  if (!pretNou) return;
  const m = shMasini.find(x => x.id === id);
  if (!m) return;
  const now = new Date();
  const dataOra = now.toLocaleDateString("ro-RO") + " · " + now.toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"});
  const istoricPret = [...(m.istoricPret||[]), { pret: pretNou, data: dataOra, user: currentUser?.name }];
  // Reset alert by updating the posting dates to today
  const updates = { pret: pretNou, istoricPret };
  if (m.dataPostCarHunt) updates.dataPostCarHunt = new Date().toISOString().split('T')[0];
  if (m.dataPostAutovit) updates.dataPostAutovit = new Date().toISOString().split('T')[0];
  await updateDoc(doc(db, "sh_masini", id), updates);
  showToast("✅ Preț actualizat! Alertele au fost resetate.");
};

window.addShTask = async (carId) => {
  const text = document.getElementById(`sh-task-text-${carId}`)?.value?.trim();
  const assignedTo = document.getElementById(`sh-task-user-${carId}`)?.value;
  const data = document.getElementById(`sh-task-data-${carId}`)?.value || "";
  if (!text || !assignedTo) return;
  const m = shMasini.find(x => x.id === carId);
  if (!m) return;
  const task = { id: Date.now(), text, assignedTo, data, done: false, createdBy: currentUser?.name, createdAt: Date.now(), source: 'sh' };
  await updateDoc(doc(db, "sh_masini", carId), { tasks: [...(m.tasks||[]), task] });
  shActiveTab[carId+'_taskform'] = false;
  showToast("✅ Task adăugat!");
};

window.doneShTask = async (carId, taskId) => {
  const m = shMasini.find(x => x.id === carId);
  if (!m) return;
  const tasks = (m.tasks||[]).map(t => t.id == taskId ? { ...t, done: true, doneBy: currentUser?.name, doneAt: Date.now() } : t);
  await updateDoc(doc(db, "sh_masini", carId), { tasks });
  showToast("✅ Task finalizat!");
};

window.addShJurnal = async (carId) => {
  const text = document.getElementById(`sh-jurnal-${carId}`)?.value?.trim();
  if (!text) return;
  const m = shMasini.find(x => x.id === carId);
  if (!m) return;
  const now = new Date();
  const dataOra = now.toLocaleDateString("ro-RO") + " · " + now.toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"});
  const jurnal = [...(m.jurnal||[]), { text, user: currentUser?.name, dataOra, createdAt: Date.now() }];
  await updateDoc(doc(db, "sh_masini", carId), { jurnal });
  shActiveTab[carId+'_jurnalform'] = false;
  showToast("✅ Notă adăugată!");
};

window.vandutaSH = async (id) => {
  if (!confirm("Marchezi mașina ca Vândută? Va merge la Perfecționare Documente.")) return;
  const m = shMasini.find(x => x.id === id);
  if (!m) return;
  // Move to perf_doc collection
  await addDoc(collection(db, "sh_perf_doc"), { ...m, vandutaAt: Date.now(), vandutaDe: currentUser?.name });
  await updateDoc(doc(db, "sh_masini", id), { vanduta: true });
  changePage('perfdoc');
  showToast("✅ Mașină mutată la Perfecționare Documente!");
};

window.togglePerfBifa = async (id, camp, checked) => {
  const text = document.getElementById(`perf-${id}-${camp}`)?.value?.trim();
  if (checked && !text) { showToast("⚠️ Completează detaliile înainte de a bifa!"); return; }
  const updates = {};
  updates[camp+'_bifa'] = checked;
  await updateDoc(doc(db, "sh_perf_doc", id), updates);
};

window.savePerfText = async (id, camp) => {
  const text = document.getElementById(`perf-${id}-${camp}`)?.value?.trim();
  if (!text) return;
  const updates = {};
  updates[camp+'_text'] = text;
  await updateDoc(doc(db, "sh_perf_doc", id), updates);
};

let perfTextTimers = {};
window.savePerfTextLive = (id, camp, value) => {
  const key = id+'_'+camp;
  clearTimeout(perfTextTimers[key]);
  perfTextTimers[key] = setTimeout(async () => {
    const updates = {};
    updates[camp+'_text'] = value.trim();
    await updateDoc(doc(db, "sh_perf_doc", id), updates);
  }, 800);
};

window.arhiveazaShMasina = async (id) => {
  const m = shPerfDoc.find(x => x.id === id);
  if (!m) return;
  const campuri = ['leasing','garantie','fiscal','rca','comision'];
  const allDone = campuri.every(c => m[c+'_bifa'] && m[c+'_text']);
  if (!allDone) { showToast("⚠️ Completează toți pașii înainte de arhivare!"); return; }
  await updateDoc(doc(db, "sh_perf_doc", id), { arhivata: true, arhivataAt: Date.now() });
  showToast("✅ Mașină arhivată!");
};

  shMasini = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  shMasini.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  render();
});

onSnapshot(collection(db, "sh_perf_doc"), snap => {
  shPerfDoc = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});
